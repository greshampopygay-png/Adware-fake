<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Adware Demo</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

.popup{
    position:absolute;
    width:220px;
    background:white;
    border:3px solid red;
    border-radius:10px;
    padding:10px;
    box-shadow:0 0 15px red;
    animation: pop 0.2s ease;
}

.popup h3{
    margin:0;
    color:red;
}

.popup button{
    margin-top:10px;
    padding:8px 12px;
    cursor:pointer;
}

@keyframes pop{
    from{
        transform:scale(0);
    }
    to{
        transform:scale(1);
    }
}
</style>
</head>
<body>

<script>
function createPopup(x, y){

    const popup = document.createElement("div");
    popup.className = "popup";

    popup.style.left = x + "px";
    popup.style.top = y + "px";

    popup.innerHTML = `
        <h3>⚠ ВЫ ВЫИГРАЛИ!</h3>
        <p>Нажмите кнопку чтобы получить приз!</p>
        <button>Получить</button>
    `;

    const button = popup.querySelector("button");

    button.onclick = function(){

        for(let i = 0; i < 3; i++){

            const randomX = Math.random() * (window.innerWidth - 240);
            const randomY = Math.random() * (window.innerHeight - 160);

            createPopup(randomX, randomY);
        }
    };

    document.body.appendChild(popup);
}

createPopup(200, 150);
</script>

</body>
</html>
